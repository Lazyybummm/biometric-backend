<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Sphere | IoT Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

    <nav class="bg-slate-900 text-white shadow-xl">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i class="fas fa-microchip text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">GRID SPHERE</h1>
                    <p class="text-[10px] text-blue-400 font-mono tracking-widest uppercase">Biometric IoT Core</p>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div id="system-status" class="flex items-center space-x-2 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                    <span class="h-2 w-2 bg-green-500 rounded-full status-pulse"></span>
                    <span class="text-xs font-medium text-slate-300">Server Online</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                
                <div class="glass-card p-6 rounded-2xl shadow-sm">
                    <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">Credentials</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1">Access Token</label>
                            <input type="text" id="accessToken" value="GridSphere2026!" class="w-full bg-slate-100 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter API Key">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1">Device ID</label>
                            <input type="text" id="deviceId" value="ESP8266_DOOR1" class="w-full bg-slate-100 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-2xl shadow-sm border-t-4 border-t-blue-500">
                    <h3 class="font-bold text-slate-800 flex items-center mb-4">
                        <i class="fas fa-user-plus mr-2 text-blue-500"></i> Register Member
                    </h3>
                    <div class="space-y-4">
                        <input type="text" id="userName" placeholder="Full Name" class="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-blue-500">
                        <input type="number" id="enrollId" placeholder="Finger ID (1-127)" class="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-blue-500">
                        <button onclick="handleEnroll()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-200 active:scale-95">
                            Start Enrollment
                        </button>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-2xl shadow-sm border-t-4 border-t-red-500">
                    <h3 class="font-bold text-slate-800 flex items-center mb-4">
                        <i class="fas fa-user-minus mr-2 text-red-500"></i> Remove User
                    </h3>
                    <div class="flex space-x-2">
                        <input type="number" id="deleteId" placeholder="ID" class="w-20 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-red-500">
                        <button onclick="handleDelete()" class="flex-grow bg-red-50 text-red-600 hover:bg-red-100 font-bold py-3 rounded-xl transition-all active:scale-95">
                            Delete ID
                        </button>
                    </div>
                </div>

                <div id="toast" class="hidden transform transition-all duration-300 translate-y-2 opacity-0 p-4 rounded-xl text-sm font-medium"></div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass-card rounded-2xl shadow-sm overflow-hidden flex flex-col h-[700px]">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                        <div>
                            <h2 class="text-lg font-bold text-slate-800">Live Attendance Feed</h2>
                            <p class="text-xs text-slate-500">Updates every 5 seconds</p>
                        </div>
                        <button onclick="fetchLogs()" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400 hover:text-blue-500">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                    
                    <div class="overflow-y-auto flex-grow p-0 bg-white" id="log-container">
                        <table class="w-full text-left">
                            <thead class="sticky top-0 bg-slate-50 text-slate-400 text-[10px] uppercase tracking-widest font-bold">
                                <tr>
                                    <th class="px-6 py-4">Timestamp</th>
                                    <th class="px-6 py-4">User</th>
                                    <th class="px-6 py-4">Status</th> <th class="px-6 py-4">Device</th>
                                    <th class="px-6 py-4">ID</th>
                                </tr>
                            </thead>
                            <tbody id="log-table-body" class="divide-y divide-slate-50">
                                </tbody>
                        </table>
                        <div id="empty-state" class="flex flex-col items-center justify-center py-20 text-slate-300 hidden">
                            <i class="fas fa-clipboard-list text-5xl mb-4"></i>
                            <p>No attendance records found</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const showToast = (msg, isError = false) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `block p-4 rounded-xl text-sm font-bold shadow-lg transform transition-all translate-y-0 opacity-100 ${isError ? 'bg-red-500 text-white' : 'bg-green-500 text-white'}`;
            setTimeout(() => {
                toast.className = 'hidden opacity-0 translate-y-2';
            }, 4000);
        };

        const getHeaders = () => ({
            "Content-Type": "application/json",
            "access-token": document.getElementById('accessToken').value
        });

        async function handleEnroll() {
            const name = document.getElementById('userName').value;
            const fid = document.getElementById('enrollId').value;
            const devId = document.getElementById('deviceId').value;

            if(!name || !fid) return showToast("Name and ID are required", true);

            try {
                const res = await fetch('/api/users/enroll', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ finger_id: parseInt(fid), name: name })
                });
                
                if (!res.ok) throw new Error(await res.text());

                await fetch('/api/admin/fire-command', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ device_id: devId, command: "enroll", target_id: parseInt(fid) })
                });

                showToast("Enrollment Started. Place finger on sensor.");
                document.getElementById('userName').value = '';
                document.getElementById('enrollId').value = '';
            } catch (e) {
                showToast("Error: " + e.message, true);
            }
        }

        async function handleDelete() {
            const fid = document.getElementById('deleteId').value;
            const devId = document.getElementById('deviceId').value;
            if(!fid) return showToast("ID required", true);

            try {
                await fetch('/api/users/delete', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ finger_id: parseInt(fid) })
                });

                await fetch('/api/admin/fire-command', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ device_id: devId, command: "delete", target_id: parseInt(fid) })
                });

                showToast(`User ID ${fid} deleted.`);
                document.getElementById('deleteId').value = '';
            } catch (e) {
                showToast("Error: " + e.message, true);
            }
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/attendance/history', { headers: getHeaders() });
                if(!res.ok) return;
                const data = await res.json();
                
                const body = document.getElementById('log-table-body');
                const empty = document.getElementById('empty-state');

                if (data.length === 0) {
                    empty.classList.remove('hidden');
                    body.innerHTML = '';
                    return;
                }

                empty.classList.add('hidden');
                body.innerHTML = data.map(log => {
                    const date = new Date(log.timestamp).toLocaleString();
                    
                    // Determine IN/OUT badge styling based on record_type
                    const statusBadge = log.record_type === 'IN' 
                        ? `<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold border border-green-200"><i class="fas fa-arrow-right mr-1"></i> IN</span>`
                        : `<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold border border-red-200"><i class="fas fa-arrow-left mr-1"></i> OUT</span>`;

                    return `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 text-xs font-mono text-slate-500">${date}</td>
                            <td class="px-6 py-4 font-bold text-slate-700">${log.user_name}</td>
                            <td class="px-6 py-4">${statusBadge}</td> <td class="px-6 py-4">
                                <span class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[10px] font-bold">${log.device_id}</span>
                            </td>
                            <td class="px-6 py-4 text-sm font-bold text-blue-600">ID: ${log.finger_id}</td>
                        </tr>
                    `;
                }).join('');
            } catch (e) { console.error(e); }
        }

        fetchLogs();
        setInterval(fetchLogs, 5000);
    </script>
</body>
</html>
